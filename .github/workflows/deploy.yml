# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# docs: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: 🚀 Deploy the charts

on:
  workflow_dispatch: # manual trigger only
    inputs:
      action:
        description: 'Action to perform. If this is the first deployment - select "install", otherwise "upgrade"'
        required: true
        type: choice
        options: [install, upgrade]
        default: upgrade
      chart:
        description: 'Chart to deploy (install order matters: system → monitoring → apps)'
        required: true
        type: choice
        options: [system, monitoring, apps, all]
        default: apps

concurrency:
  group: ${{ github.ref }}-helm-deploy-${{ inputs.chart }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy the ${{ inputs.chart }} chart
    runs-on: ubuntu-latest
    environment: Production
    env: {KUBECONFIG: /tmp/kubeconfig.yaml}
    steps:
      - uses: actions/checkout@v6
      - uses: dopplerhq/cli-action@v4
      - uses: azure/setup-kubectl@v5
      - uses: azure/setup-helm@v5

      - name: Setup kubeconfig
        run: |
          doppler --no-check-version secrets get --plain KUBE_CONFIG > $KUBECONFIG
          chmod 400 $KUBECONFIG
        env: {DOPPLER_TOKEN: "${{ secrets.DOPPLER_SERVICE_TOKEN }}"}

      - name: Deploy
        run: |
          for chart in system monitoring apps; do
            [[ "${{ inputs.chart }}" != "all" && "${{ inputs.chart }}" != "$chart" ]] && continue
            cd "$GITHUB_WORKSPACE/helm/$chart"
            doppler --no-check-version secrets substitute ./values.doppler.yaml > ./values.yaml
            helm dependency update .
            helm ${{ inputs.action }} --namespace "$chart" --rollback-on-failure --create-namespace "$chart" .
          done
        env: {DOPPLER_TOKEN: "${{ secrets.DOPPLER_SERVICE_TOKEN }}"}

      - name: Cleanup
        if: always()
        run: rm -f $KUBECONFIG helm/*/values.yaml
